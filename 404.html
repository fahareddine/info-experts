<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable | Info Experts Moroni</title>
    <meta name="description" content="La page que vous recherchez est introuvable. Retournez à l'accueil d'Info Experts, votre spécialiste informatique à Moroni, Comores.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://info-experts.fr/">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy: #1e3a8a;
            --navy-light: #1e40af;
            --blue: #60a5fa;
            --blue-light: #bfdbfe;
            --bg: #eff6ff;
            --text: #1e293b;
            --muted: #64748b;
            --border: #dbeafe;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Sora', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Background subtle grid pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--blue-light) 1px, transparent 1px),
                linear-gradient(90deg, var(--blue-light) 1px, transparent 1px);
            background-size: 48px 48px;
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Logo bar ─────────────────────────────── */
        .logo-bar {
            position: relative;
            z-index: 1;
            padding: 28px 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeDown 0.5s ease both;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            color: var(--navy);
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--navy);
        }

        .logo-text span {
            color: var(--blue);
        }

        /* ── Main content ─────────────────────────── */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 24px 60px;
            position: relative;
            z-index: 1;
        }

        .card {
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        /* Giant ghost 404 */
        .number-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 8px;
            animation: fadeUp 0.6s ease 0.1s both;
        }

        .number-ghost {
            font-size: clamp(120px, 22vw, 200px);
            font-weight: 700;
            letter-spacing: -0.05em;
            line-height: 1;
            color: transparent;
            -webkit-text-stroke: 2px var(--blue-light);
            user-select: none;
            pointer-events: none;
        }

        .number-real {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(60px, 11vw, 100px);
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--navy);
        }

        /* Divider line */
        .divider {
            width: 48px;
            height: 3px;
            background: var(--blue);
            border-radius: 2px;
            margin: 0 auto 24px;
            animation: fadeUp 0.6s ease 0.2s both;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 12px;
            animation: fadeUp 0.6s ease 0.25s both;
        }

        .subtitle {
            font-size: 0.95rem;
            font-weight: 300;
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 40px;
            animation: fadeUp 0.6s ease 0.3s both;
        }

        /* ── Buttons ──────────────────────────────── */
        .btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 48px;
            animation: fadeUp 0.6s ease 0.35s both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 10px;
            font-family: 'Sora', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--navy);
            color: #fff;
            box-shadow: 0 4px 16px rgba(30, 58, 138, 0.25);
        }

        .btn-primary:hover {
            background: var(--navy-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(30, 58, 138, 0.35);
        }

        .btn-secondary {
            background: #fff;
            color: var(--navy);
            border: 1.5px solid var(--border);
            box-shadow: 0 2px 8px rgba(30, 58, 138, 0.08);
        }

        .btn-secondary:hover {
            border-color: var(--blue);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(96, 165, 250, 0.2);
        }

        .btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* ── Quick links ──────────────────────────── */
        .links-section {
            animation: fadeUp 0.6s ease 0.4s both;
        }

        .links-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .links {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            display: inline-block;
            padding: 6px 14px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--navy);
            text-decoration: none;
            transition: border-color 0.15s, background 0.15s, transform 0.15s;
        }

        .links a:hover {
            border-color: var(--blue);
            background: var(--blue-light);
            transform: translateY(-1px);
        }

        /* ── Footer ───────────────────────────────── */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px 24px;
            font-size: 0.78rem;
            color: var(--muted);
            font-weight: 300;
            border-top: 1px solid var(--border);
        }

        footer a {
            color: var(--navy);
            text-decoration: none;
            font-weight: 500;
        }

        footer a:hover { text-decoration: underline; }

        /* ── Animations ───────────────────────────── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .logo-bar { padding: 20px 20px; }
            .btns { flex-direction: column; align-items: center; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

</body>
</html>
